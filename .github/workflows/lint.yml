name: Lint & Test Charts

on:
  pull_request:
    paths:
      - 'charts/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add dependency repos
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Update chart dependencies
        run: |
          for chart in charts/*/; do
            if [ -f "$chart/Chart.lock" ] || grep -q 'dependencies:' "$chart/Chart.yaml" 2>/dev/null; then
              echo "Updating dependencies for $chart"
              helm dependency update "$chart"
            fi
          done

      - name: Lint all charts
        run: |
          for chart in charts/*/; do
            echo "Linting $chart"
            helm lint "$chart"
          done

      - name: Template all charts
        run: |
          for chart in charts/*/; do
            name=$(basename "$chart")
            echo "Templating $name"
            case "$name" in
              n8n)         helm template test charts/"$name" --set n8n.encryptionKey=test-key ;;
              simple-app)  helm template test charts/"$name" --set image.repository=nginx,image.tag=latest ;;
              *)           helm template test charts/"$name" ;;
            esac
          done
