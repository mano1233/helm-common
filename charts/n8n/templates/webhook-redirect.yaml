{{- if .Values.webhookRedirects }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "n8n.fullname" . }}-webhook-proxy
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
data:
  nginx.conf: |
    upstream n8n {
      server {{ include "n8n.fullname" . }}:{{ .Values.service.port }};
    }
    
    server {
      listen 80;
      
      # Health check endpoint
      location /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
      }
      
      # Webhook redirects/aliases
      {{- range .Values.webhookRedirects }}
      location /webhook/{{ .alias }}/ {
        rewrite ^/webhook/{{ .alias }}/(.*)$ /webhook/{{ .uuid }}/$1 break;
        proxy_pass http://n8n;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
      location = /webhook/{{ .alias }} {
        rewrite ^/webhook/{{ .alias }}$ /webhook/{{ .uuid }} break;
        proxy_pass http://n8n;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
      {{- end }}
      
      # Pass all other requests to n8n
      location / {
        proxy_pass http://n8n;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "n8n.fullname" . }}-webhook-proxy
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "n8n.fullname" . }}-webhook-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "n8n.fullname" . }}-webhook-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
      volumes:
        - name: config
          configMap:
            name: {{ include "n8n.fullname" . }}-webhook-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "n8n.fullname" . }}-webhook-proxy
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 80
      name: http
  selector:
    app.kubernetes.io/name: {{ include "n8n.fullname" . }}-webhook-proxy
{{- end }}
