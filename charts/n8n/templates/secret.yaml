{{- if not .Values.n8n.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8n.fullname" . }}-encryption
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.n8n.encryptionKey }}
  N8N_ENCRYPTION_KEY: {{ .Values.n8n.encryptionKey | b64enc | quote }}
  {{- else }}
  # Auto-generate a random encryption key if not provided
  N8N_ENCRYPTION_KEY: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
