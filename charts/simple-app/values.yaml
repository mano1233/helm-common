replicaCount: 1

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  annotations: {}

# Plain env vars and secret refs passed directly to the container spec.
# Examples:
#   env:
#     - name: FOO
#       value: "bar"
#     - name: SECRET_KEY
#       valueFrom:
#         secretKeyRef:
#           name: my-secret
#           key: secret-key
env: []

# Bulk env injection from ConfigMaps or Secrets.
# Examples:
#   envFrom:
#     - configMapRef:
#         name: my-config
#     - secretRef:
#         name: my-secret
envFrom: []

# Create a ConfigMap from inline data and optionally mount it.
configMap:
  enabled: false
  data: {}
  # Volume mount settings (only used when enabled and mountPath is set).
  mountPath: ""   # e.g. /etc/myapp/config.yml
  subPath: ""     # e.g. config.yml — mounts a single key as a file

# Create a Secret from stringData. Automatically injected as envFrom.
secret:
  enabled: false
  stringData: {}

# Persistent volume claim for stateful data.
persistence:
  enabled: false
  size: 1Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  mountPath: /data
  annotations: {}

resources: {}
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  # limits:
  #   cpu: 500m
  #   memory: 512Mi

# Probes are passed directly to the container spec.
# Examples:
#   livenessProbe:
#     httpGet:
#       path: /healthz
#       port: http
#     initialDelaySeconds: 10
#     periodSeconds: 30
livenessProbe: {}
readinessProbe: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  #   - host: app.example.com
  #     paths:
  #       - path: /
  #         pathType: ImplementationSpecific
  tls: []

nodeSelector: {}

tolerations: []

affinity: {}

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

# Escape hatches for advanced use cases.
extraVolumes: []
extraVolumeMounts: []
